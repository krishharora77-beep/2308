<!-- WP4.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Happy Birthday</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="music.css">
</head>

<body class="wp4">

  <!-- floating sparkles -->
  <div class="sparkles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- main card -->
  <div class="wp4-box">

    <img src="cat-cake.png" class="cake-cat">

    <h1>
      Happy Birthday, TARISHA 💗
    </h1>

    <p>
      Today is all about you...
      <br>
      and yes,
      this surprise was waiting for you 😏
    </p>

    <button class="music-btn" id="musicBtn">
    🎧
    </button>

<div class="music-popup" id="musicPopup">

    <div class="close-player" id="closePlayer">
        ✕
    </div>

    <div class="song-title">
        Tu Hai Kahaan
    </div>

    <div class="play-btn" id="playBtn">
        ▶
    </div>

    <input
        type="range"
        class="progress"
        id="progress"
        value="0"
        min="0"
        max="100"
    >

    <div class="time-row">

        <span id="currentTime">
            0:00
        </span>

        <span id="totalTime">
            0:00
        </span>

    </div>

</div>

<audio id="audio" src="TuHaiKahaan.mp3" preload="auto">
    </audio>

    <a href="WP5.html">
      <button class="wp4-btn">
        Open Your Memories 💌
      </button>
    </a>

  </div>
<script src="music.js"></script>
</body>
</html>
