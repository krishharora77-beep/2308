<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Delivery</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="wp1">

<div class="hearts">
  <span style="left:8%;animation-delay:0s;">♥</span>
  <span style="left:18%;animation-delay:2s;">♥</span>
  <span style="left:30%;animation-delay:4s;">♥</span>
  <span style="left:50%;animation-delay:1s;">♥</span>
  <span style="left:66%;animation-delay:5s;">♥</span>
  <span style="left:78%;animation-delay:3s;">♥</span>
  <span style="left:90%;animation-delay:6s;">♥</span>
</div>

<div class="card" id="card">

<div class="small">PRIVATE DELIVERY</div>

<div class="envelope" id="env">💌</div>

<h1>Identity Verification</h1>

<p class="sub">A surprise has been prepared for someone special.</p>

<input type="text" id="name" placeholder="Enter Your Name">

<input type="password" id="pass" placeholder="Enter Passcode">

<p class="hint" id="hint">Hint: What makes today special?</p>

<button onclick="verifyUser()">Continue 💌</button>

<div id="status"></div>

<p class="footer">-Secured by someone who cares ...</p>

</div>

<script>
const realPass = "2308"; // change password
const allowedNames = [
  "tarisha saxena",
  "ts",
  "tarisha",
  "t"
];

let tries = 0;

function verifyUser(){

    let userName = document.getElementById("name").value.trim().toLowerCase();
    let pass = document.getElementById("pass").value.trim();
    let status = document.getElementById("status");
    let card = document.getElementById("card");
    let env = document.getElementById("env");
    let hint = document.getElementById("hint");

    if(allowedNames.includes(userName) && pass === realPass){

        env.innerHTML = "📩";
        status.innerHTML = "Identity Confirmed 💌<br>Welcome...";
        status.style.color = "#8dff8d";

        setTimeout(()=>{
            window.location.href = "WEB2.html";
        },2200);

    }else if(!allowedNames.includes(userName)){

        env.innerHTML = "📪";
        status.innerHTML = "Oops 😏<br>This delivery belongs to someone else.";
        status.style.color = "#ff9e9e";

        setTimeout(()=>{
            window.location.href = "other.html";
        },2200);

    }else{

        tries++;
        card.classList.add("shake");
        setTimeout(()=>card.classList.remove("shake"),400);

        const hints = [
          "Hint: What makes today special?",
          "Hint: Today's iconic date...",
          "Hint: This day belongs to whom? 😏"
        ];

        const msgs = [
          "Wrong code 😭",
          "Cute try... still wrong 💀",
          "Access denied 👀"
        ];

        hint.innerHTML = hints[Math.min(tries,2)];
        status.innerHTML = msgs[Math.min(tries-1,2)];
        status.style.color = "#ff9e9e";
    }
}
</script>

</body>
</html>
